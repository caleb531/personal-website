<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- reusable icon elements -->
  <defs>
    <!-- green gradient -->
    <linearGradient id="flashmath-green-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#85d84f" />
      <stop offset="52%" stop-color="#66b936" />
      <stop offset="100%" stop-color="#52a532" />
    </linearGradient>
    <rect id="flashmath-symbol-bar" x="-100" y="-20" width="200" height="40" />
  </defs>
  <!-- equal sign -->
  <g fill="url(#flashmath-green-gradient)">
    <!-- top -->
    <use xlink:href="#flashmath-symbol-bar" x="160" y="120" />
    <!-- bottom -->
    <use xlink:href="#flashmath-symbol-bar" x="160" y="200" />
  </g>
</svg>
