<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- blue gradient -->
    <linearGradient id="binarybrancher-blue-gradient" x1="80" y1="80" x2="240" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#668cff" />
      <stop offset="52%" stop-color="#3366ee" />
      <stop offset="100%" stop-color="#2444b8" />
    </linearGradient>
  </defs>
  <!-- connecting lines -->
  <g stroke="url(#binarybrancher-blue-gradient)">
    <polyline points="80,240 160,80 240,240" fill="none" stroke-width="12" />
    <!-- circles -->
    <g fill="url(#binarybrancher-blue-gradient)" stroke-width="4">
      <!-- top -->
      <circle cx="160" cy="80" r="40" />
      <!-- left -->
      <circle cx="80" cy="240" r="40" />
      <!-- right -->
      <circle cx="240" cy="240" r="40" />
    </g>
  </g>
</svg>
