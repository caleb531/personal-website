<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- blue gradient -->
    <linearGradient id="binomialexpander-blue-gradient" x1="100" y1="40" x2="220" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6e91f4" />
      <stop offset="52%" stop-color="#3863df" />
      <stop offset="100%" stop-color="#243fa3" />
    </linearGradient>
    <!-- red gradient -->
    <linearGradient id="binomialexpander-red-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7979" />
      <stop offset="45%" stop-color="#e22d2d" />
      <stop offset="100%" stop-color="#991b23" />
    </linearGradient>
    <!-- orange gradient -->
    <linearGradient id="binomialexpander-orange-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb35f" />
      <stop offset="45%" stop-color="#f2761c" />
      <stop offset="100%" stop-color="#b5470f" />
    </linearGradient>
    <!-- yellow gradient -->
    <linearGradient id="binomialexpander-yellow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe878" />
      <stop offset="45%" stop-color="#f5c536" />
      <stop offset="100%" stop-color="#b98218" />
    </linearGradient>
    <!-- green gradient -->
    <linearGradient id="binomialexpander-green-gradient" x1="87" y1="100" x2="233" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c0f285" />
      <stop offset="45%" stop-color="#7fd249" />
      <stop offset="100%" stop-color="#3e972f" />
    </linearGradient>
    <!-- transition lines -->
    <path id="binomialexpander-transition-lines" d="M 160,100 L 87,220 M 160,100 L 160,220 M 160,100 L 233,220" fill="none" stroke-linecap="round" />
    <path id="binomialexpander-plus" d="M -2,-12 L 2,-12 L 2,-2 L 12,-2 L 12,2 L 2,2 L 2,12 L -2,12 L -2,2 L -12,2 L -12,-2 L -2,-2 Z" fill="url(#binomialexpander-blue-gradient)" stroke="url(#binomialexpander-blue-gradient)" stroke-width="2" />
    <!-- terms -->
    <circle id="binomialexpander-term" cx="0" cy="0" r="10" stroke-width="2" />
    <use id="binomialexpander-first-term" xlink:href="#binomialexpander-term" x="0" y="0" fill="url(#binomialexpander-red-gradient)" stroke="url(#binomialexpander-red-gradient)" />
    <use id="binomialexpander-second-term" xlink:href="#binomialexpander-term" x="0" y="0" fill="url(#binomialexpander-orange-gradient)" stroke="url(#binomialexpander-orange-gradient)" />
    <!-- exponent term -->
    <circle id="binomialexpander-exponent" cx="20" cy="-20" r="8" fill="url(#binomialexpander-yellow-gradient)" stroke="url(#binomialexpander-yellow-gradient)" stroke-width="2" />
    <!-- parens -->
    <path id="binomialexpander-paren-opening" d="M 0,20 Q -18,0 0,-20 L 2,-16 Q -12,0 2,16 Z" fill="url(#binomialexpander-blue-gradient)" stroke="url(#binomialexpander-blue-gradient)" stroke-width="2" />
    <use id="binomialexpander-paren-closing" xlink:href="#binomialexpander-paren-opening" transform="scale(-1,1)" />
  </defs>
  <use xlink:href="#binomialexpander-paren-opening" x="105" y="60" />
  <use xlink:href="#binomialexpander-first-term" x="125" y="60" />
  <use xlink:href="#binomialexpander-plus" x="160" y="60" />
  <use xlink:href="#binomialexpander-second-term" x="195" y="60" />
  <use xlink:href="#binomialexpander-paren-closing" x="215" y="60" />
  <use xlink:href="#binomialexpander-exponent" x="215" y="60" />
  <!-- transition lines -->
  <g>
    <!-- transition line stroke -->
    <use xlink:href="#binomialexpander-transition-lines" fill="none" stroke="url(#binomialexpander-green-gradient)" stroke-width="14" stroke-linecap="round" />
    <!-- transition line fill -->
    <use xlink:href="#binomialexpander-transition-lines" fill="none" stroke="url(#binomialexpander-green-gradient)" stroke-width="6" stroke-linecap="round" />
  </g>
  <!-- first expanded term -->
  <use xlink:href="#binomialexpander-first-term" x="60" y="260" />
  <use xlink:href="#binomialexpander-plus" x="102" y="260" />
  <!-- second expanded term -->
  <use xlink:href="#binomialexpander-first-term" x="144" y="260" />
  <use xlink:href="#binomialexpander-second-term" x="176" y="260" />
  <use xlink:href="#binomialexpander-plus" x="218" y="260" />
  <!-- third expanded term -->
  <use xlink:href="#binomialexpander-second-term" x="260" y="260" />

</svg>
