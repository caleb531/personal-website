<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- deep blue gradient -->
    <linearGradient id="jcanvas-deep-blue-gradient" x1="70" y1="95" x2="124" y2="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6e91f4" />
      <stop offset="52%" stop-color="#3863df" />
      <stop offset="100%" stop-color="#243fa3" />
    </linearGradient>
    <!-- blue gradient -->
    <linearGradient id="jcanvas-blue-gradient" x1="110" y1="80" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#75c4ff" />
      <stop offset="52%" stop-color="#3399f6" />
      <stop offset="100%" stop-color="#1d66bd" />
    </linearGradient>
  </defs>
  <g fill="none">
    <!-- letter j body -->
    <path d="M 114,116 L 114,234 A 20,20 0,0,1 80,245" stroke="url(#jcanvas-deep-blue-gradient)" stroke-width="20" />
    <path d="M 114,120 L 114,230 A 20,20 0,0,1 80,245" stroke="url(#jcanvas-deep-blue-gradient)" stroke-width="12" />
    <!-- stroke cap for button of letter j -->
    <path d="M 86,237 L 71.75,250.75" stroke="url(#jcanvas-deep-blue-gradient)" stroke-width="4" />
  </g>
  <!-- dot atop letter j -->
  <circle cx="114" cy="95" r="10" fill="url(#jcanvas-deep-blue-gradient)" stroke="url(#jcanvas-deep-blue-gradient)" stroke-width="4" />
  <!-- letter c -->
  <g fill="url(#jcanvas-blue-gradient)" stroke="url(#jcanvas-blue-gradient)" stroke-width="4" transform="translate(0,100) rotate(-30)">
    <!-- dot in letter c -->
    <circle cx="160" cy="160" r="10" />
    <!-- letter c body -->
    <path d="M 160,100 A 60,60,0,0,0,160,220 L 160,240 A 80,80,0,0,1,160,80 Z" />
  </g>
</svg>
