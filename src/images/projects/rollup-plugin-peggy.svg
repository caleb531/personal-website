<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <defs>
    <!-- red gradient -->
    <linearGradient id="rpp-red-gradient" x1="70" y1="50" x2="240" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6262" />
      <stop offset="52%" stop-color="#ee2222" />
      <stop offset="100%" stop-color="#aa1420" />
    </linearGradient>
    <!-- yellow gradient -->
    <linearGradient id="rpp-yellow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe164" />
      <stop offset="50%" stop-color="#ffcc22" />
      <stop offset="100%" stop-color="#d39100" />
    </linearGradient>
    <!-- Peggy "peg" -->
      <circle id="rpp-peg" cx="0" cy="0" r="14" fill="url(#rpp-yellow-gradient)" />
  </defs>


  <!-- rollup logo "R" -->
  <path d="M 80,260 80,60 L 175,60 A 63,63,0,0,1,200,180 L 235,260 Z" fill="url(#rpp-red-gradient)" stroke="url(#rpp-red-gradient)" stroke-width="10" stroke-linejoin="round" />

  <!-- Peggy "pegs" -->
  <use xlink:href="#rpp-peg" x="115" y="100" />
  <use xlink:href="#rpp-peg" x="170" y="100" />
  <use xlink:href="#rpp-peg" x="115" y="160" />
  <use xlink:href="#rpp-peg" x="170" y="160" />
  <use xlink:href="#rpp-peg" x="115" y="220" />
  <use xlink:href="#rpp-peg" x="170" y="220" />

</svg>
