<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- bracket gradient -->
    <linearGradient id="sequencer-bracket-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8dd1ff" />
      <stop offset="52%" stop-color="#3399ff" />
      <stop offset="100%" stop-color="#145fc0" />
    </linearGradient>
    <!-- sigma gradient -->
    <linearGradient id="sequencer-sigma-gradient" x1="100" y1="80" x2="220" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6e91f4" />
      <stop offset="52%" stop-color="#3863df" />
      <stop offset="100%" stop-color="#243fa3" />
    </linearGradient>
    <path id="sequencer-bracket" d="M 20,60 Q -5,60 -5,30 Q -5,10 -20,6 L -20,-6 Q -5,-6 -5,-30 Q -5,-60 20,-60 L 20,-50 Q 5,-50 5,-30 Q 5,0 -10,0 Q 5,0 5,30 Q 5,50 20,50 Z" fill="url(#sequencer-bracket-gradient)" stroke="url(#sequencer-bracket-gradient)" stroke-width="4" />
  </defs>
  <!-- summation symbol -->
  <polygon points="220,240 100,240 100,220 160,160 100,100 100,80 220,80 220,100 130,100 190,160 130,220 220,220" fill="url(#sequencer-sigma-gradient)" stroke="url(#sequencer-sigma-gradient)" stroke-width="4" stroke-linejoin="round" />
  <use xlink:href="#sequencer-bracket" x="60" y="160" />
  <use xlink:href="#sequencer-bracket" x="260" y="160" transform="translate(520,0) scale(-1,1)" />
</svg>
