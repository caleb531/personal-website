<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- reusable icon components -->
  <defs>
    <!-- red gradient -->
    <linearGradient id="repeat-red-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7d7d" />
      <stop offset="52%" stop-color="#e22d2d" />
      <stop offset="100%" stop-color="#991b23" />
    </linearGradient>
    <!-- orange gradient -->
    <linearGradient id="repeat-orange-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb35f" />
      <stop offset="52%" stop-color="#f2761c" />
      <stop offset="100%" stop-color="#b5470f" />
    </linearGradient>
    <!-- green gradient -->
    <linearGradient id="repeat-green-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bef28d" />
      <stop offset="52%" stop-color="#78cf48" />
      <stop offset="100%" stop-color="#3f8f2a" />
    </linearGradient>
    <!-- yellow gradient -->
    <linearGradient id="repeat-yellow-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe878" />
      <stop offset="52%" stop-color="#f5c536" />
      <stop offset="100%" stop-color="#b98218" />
    </linearGradient>
    <!-- color square -->
    <rect id="repeat-square" width="100" height="100" rx="10" ry="10" stroke-width="4" />
  </defs>
  <!-- squares -->
  <g>
    <!-- red -->
    <use xlink:href="#repeat-square" x="50" y="50" fill="url(#repeat-red-gradient)" stroke="url(#repeat-red-gradient)" />
    <!-- orange -->
    <use xlink:href="#repeat-square" x="170" y="50" fill="url(#repeat-orange-gradient)" stroke="url(#repeat-orange-gradient)" />
    <!-- green -->
    <use xlink:href="#repeat-square" x="50" y="170" fill="url(#repeat-green-gradient)" stroke="url(#repeat-green-gradient)" />
    <!-- yellow -->
    <use xlink:href="#repeat-square" x="170" y="170" fill="url(#repeat-yellow-gradient)" stroke="url(#repeat-yellow-gradient)" />
  </g>
</svg>
