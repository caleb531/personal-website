<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- blue gradient -->
    <linearGradient id="htmlselector-blue-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#65b8ff" />
      <stop offset="52%" stop-color="#3399ff" />
      <stop offset="100%" stop-color="#2d83dc" />
    </linearGradient>
    <!-- red gradient -->
    <linearGradient id="htmlselector-red-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ff6262" />
      <stop offset="52%" stop-color="#ee2222" />
      <stop offset="100%" stop-color="#c92a31" />
    </linearGradient>
    <!-- green gradient -->
    <linearGradient id="htmlselector-green-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#82dc49" />
      <stop offset="48%" stop-color="#66c837" />
      <stop offset="100%" stop-color="#55aa34" />
    </linearGradient>
    <!-- element name dot -->
    <circle id="htmlselector-dot" cx="0" cy="0" r="20" stroke-width="4" />
    <!-- closing angle bracket -->
    <polyline id="htmlselector-gt-sign" points="-20,-30 20,0 -20,30" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <path id="htmlselector-arrow" d="M 0,-20 L 0,20 M -15,5 L 0,20 L 15,5" fill="none" stroke-linecap="round" stroke-linejoin="round" />
  </defs>
  <!-- transition arrow -->
  <g>
    <use xlink:href="#htmlselector-arrow" x="160" y="160" stroke="url(#htmlselector-blue-gradient)" stroke-width="10" />
    <use xlink:href="#htmlselector-arrow" x="160" y="160" stroke="url(#htmlselector-blue-gradient)" stroke-width="4" />
  </g>
  <!-- child combinator -->
  <g>
    <use xlink:href="#htmlselector-gt-sign" x="160" y="80" stroke="url(#htmlselector-red-gradient)" stroke-width="18" />
    <use xlink:href="#htmlselector-gt-sign" x="160" y="80" stroke="url(#htmlselector-red-gradient)" stroke-width="10" />
  </g>
  <g fill="url(#htmlselector-red-gradient)" stroke="url(#htmlselector-red-gradient)">
    <!-- parent name -->
    <use xlink:href="#htmlselector-dot" x="80" y="80" />
    <!-- child name -->
    <use xlink:href="#htmlselector-dot" x="240" y="80" />
  </g>
  <!-- opening angle bracket -->
  <g transform="translate(200,0) scale(-1,1)">
    <use xlink:href="#htmlselector-gt-sign" x="100" y="240" stroke="url(#htmlselector-green-gradient)" stroke-width="18" />
    <use xlink:href="#htmlselector-gt-sign" x="100" y="240" stroke="url(#htmlselector-green-gradient)" stroke-width="10" />
  </g>
  <!-- opening angle bracket -->
  <g>
    <use xlink:href="#htmlselector-gt-sign" x="220" y="240" stroke="url(#htmlselector-green-gradient)" stroke-width="18" />
    <use xlink:href="#htmlselector-gt-sign" x="220" y="240" stroke="url(#htmlselector-green-gradient)" stroke-width="10" />
  </g>
  <!-- tag name -->
  <use xlink:href="#htmlselector-dot" x="160" y="240" fill="url(#htmlselector-green-gradient)" stroke="url(#htmlselector-green-gradient)" />
</svg>
