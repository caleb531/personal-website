<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- deep purple gradient -->
    <linearGradient id="unscrambler-deep-purple-gradient" x1="110" y1="80" x2="210" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a889ec" />
      <stop offset="52%" stop-color="#7349d6" />
      <stop offset="100%" stop-color="#4f2aa7" />
    </linearGradient>
    <!-- purple gradient -->
    <linearGradient id="unscrambler-purple-gradient" x1="110" y1="200" x2="210" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c79aff" />
      <stop offset="52%" stop-color="#9560f0" />
      <stop offset="100%" stop-color="#6532bd" />
    </linearGradient>
    <!-- dot purple gradient -->
    <linearGradient id="unscrambler-dot-purple-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c79aff" />
      <stop offset="58%" stop-color="#9560f0" />
      <stop offset="100%" stop-color="#6532bd" />
    </linearGradient>
    <!-- dot deep purple gradient -->
    <linearGradient id="unscrambler-dot-deep-purple-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a889ec" />
      <stop offset="58%" stop-color="#7349d6" />
      <stop offset="100%" stop-color="#4f2aa7" />
    </linearGradient>
    <path id="unscrambler-arrow" d="M -50,0 L 50,0 M -30,-20 L -50,0 L -30,20 M 30,-20 L 50,0 L 30,20" fill="none" stroke-linecap="round" stroke-linejoin="round" />
    <!-- dot representing letter -->
    <circle id="unscrambler-dot" r="16" />
  </defs>
  <!-- double arrow strokes -->
  <g stroke-width="16">
    <!-- top -->
    <use xlink:href="#unscrambler-arrow" x="160" y="100" stroke="url(#unscrambler-deep-purple-gradient)" />
    <!-- bottom -->
    <use xlink:href="#unscrambler-arrow" x="160" y="220" stroke="url(#unscrambler-purple-gradient)" />
  </g>
  <g stroke-width="8">
    <!-- top -->
    <use xlink:href="#unscrambler-arrow" x="160" y="100" stroke="url(#unscrambler-deep-purple-gradient)" />
    <!-- bottom -->
    <use xlink:href="#unscrambler-arrow" x="160" y="220" stroke="url(#unscrambler-purple-gradient)" />
  </g>
  <!-- letter dots -->
  <g stroke-width="4">
    <!-- top-left -->
    <use xlink:href="#unscrambler-dot" x="60" y="100" fill="url(#unscrambler-dot-purple-gradient)" stroke="url(#unscrambler-dot-purple-gradient)" />
    <!-- top-right -->
    <use xlink:href="#unscrambler-dot" x="260" y="100" fill="url(#unscrambler-dot-purple-gradient)" stroke="url(#unscrambler-dot-purple-gradient)" />
    <!-- bottom-left -->
    <use xlink:href="#unscrambler-dot" x="60" y="220" fill="url(#unscrambler-dot-deep-purple-gradient)" stroke="url(#unscrambler-dot-deep-purple-gradient)" />
    <!-- bottom-right -->
    <use xlink:href="#unscrambler-dot" x="260" y="220" fill="url(#unscrambler-dot-deep-purple-gradient)" stroke="url(#unscrambler-dot-deep-purple-gradient)" />
  </g>
</svg>
