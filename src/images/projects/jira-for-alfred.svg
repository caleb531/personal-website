<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- diamond gradient -->
    <linearGradient id="jira-diamond-gradient" x1="40" y1="40" x2="280" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6e91f4" />
      <stop offset="52%" stop-color="#3863df" />
      <stop offset="100%" stop-color="#243fa3" />
    </linearGradient>
    <!-- hat gradient -->
    <linearGradient id="jira-hat-gradient" x1="100" y1="120" x2="220" y2="195" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="52%" stop-color="#f2f6ff" />
      <stop offset="100%" stop-color="#c8d4ea" />
    </linearGradient>
  </defs>
  <!-- jira emblem outer diamond -->
  <polygon points="160,40 280,160 160,280 40,160" fill="url(#jira-diamond-gradient)" stroke="url(#jira-diamond-gradient)" stroke-width="10" stroke-linejoin="round" />
  <!-- Alfred hat -->
  <g fill="url(#jira-hat-gradient)">
    <!-- top -->
    <ellipse cx="160" cy="155" rx="40" ry="35" />
    <!-- middle -->
    <rect x="120" y="155" width="80" height="20" />
    <!-- bottom -->
    <ellipse cx="160" cy="175" rx="60" ry="20" />
  </g>
</svg>
