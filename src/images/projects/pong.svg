<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- icon elements -->
  <defs>
    <!-- paddle gradient -->
    <linearGradient id="pong-paddle-gradient" x1="60" y1="50" x2="260" y2="270" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#87a2ff" />
      <stop offset="52%" stop-color="#3f67ea" />
      <stop offset="100%" stop-color="#243fa3" />
    </linearGradient>
    <!-- ball gradient -->
    <linearGradient id="pong-ball-gradient" x1="136" y1="136" x2="184" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f16969" />
      <stop offset="62%" stop-color="#df3030" />
      <stop offset="100%" stop-color="#bd252b" />
    </linearGradient>
    <!-- line used to make both paddle fill and stroke -->
    <line id="pong-paddle-line" x1="0" y1="0" x2="0" y2="160" fill="none" stroke-linecap="round" />
    <!-- combined paddle fill and stroke -->
    <g id="pong-paddle">
      <use xlink:href="#pong-paddle-line" stroke="url(#pong-paddle-gradient)" stroke-width="20" />
      <use xlink:href="#pong-paddle-line" stroke="url(#pong-paddle-gradient)" stroke-width="12" />
    </g>
  </defs>
  <!-- ball -->
  <circle cx="160" cy="160" r="24" fill="url(#pong-ball-gradient)" stroke="url(#pong-ball-gradient)" stroke-width="4" />
  <!-- left paddle -->
  <use xlink:href="#pong-paddle" x="60" y="110" />
  <!-- right paddle -->
  <use xlink:href="#pong-paddle" x="260" y="50" />
</svg>
