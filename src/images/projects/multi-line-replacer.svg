<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <!-- target gradient -->
    <linearGradient id="multiline-target-gradient" x1="40" y1="40" x2="180" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff7979" />
      <stop offset="52%" stop-color="#e22d2d" />
      <stop offset="100%" stop-color="#991b23" />
    </linearGradient>
    <!-- arrow gradient -->
    <linearGradient id="multiline-arrow-gradient" x1="140" y1="140" x2="170" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#75c4ff" />
      <stop offset="52%" stop-color="#3399f6" />
      <stop offset="100%" stop-color="#1d66bd" />
    </linearGradient>
    <!-- replacement gradient -->
    <linearGradient id="multiline-replacement-gradient" x1="180" y1="200" x2="280" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b7f083" />
      <stop offset="52%" stop-color="#7dd24b" />
      <stop offset="100%" stop-color="#3f8f2a" />
    </linearGradient>
  </defs>
  <!-- target lines -->
  <g fill="url(#multiline-target-gradient)">
    <rect x="40" y="40" width="100" height="20"/>
    <rect x="40" y="70" width="140" height="20"/>
    <rect x="40" y="100" width="80" height="20"/>
  </g>
  <!-- find+replace arrow -->
  <path d="M 140,140 L 170,170 M 140,170 L 170,170 L 170,140" fill="none" stroke="url(#multiline-arrow-gradient)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" />
  <!-- replacement lines -->
  <g fill="url(#multiline-replacement-gradient)">
    <rect x="180" y="200" width="80" height="20"/>
    <rect x="180" y="230" width="60" height="20"/>
    <rect x="180" y="260" width="100" height="20"/>
  </g>
</svg>
