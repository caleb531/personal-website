  </defs>
  <!-- letter w -->
  <polygon points="115,50 85,50 115,160 140,160 160,110 180,160 205,160 235,50 205,50 190,120 175,80 145,80 130,120" fill="url(#weblibs-deep-blue-gradient)" stroke="url(#weblibs-deep-blue-gradient)" stroke-width="4" transform="translate(-20,-30) scale(1.1) rotate(15)" />
  <!-- letter l -->
  <polygon points="130,215 130,320 190,320 190,300 152,300 152,215" fill="url(#weblibs-blue-gradient)" stroke="url(#weblibs-blue-gradient)" stroke-width="4" transform="translate(-15,-25) scale(1.1) rotate(-15)" />
