<svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <!-- reusable icon elements -->
  <defs>
    <!-- cog gradient -->
    <linearGradient id="swum-cog-gradient" x1="35" y1="35" x2="285" y2="285" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5e6070" />
      <stop offset="52%" stop-color="#33333b" />
      <stop offset="100%" stop-color="#17171e" />
    </linearGradient>
    <!-- arrow gradient -->
    <linearGradient id="swum-arrow-gradient" x1="80" y1="100" x2="240" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#80d5ff" />
      <stop offset="52%" stop-color="#33bbff" />
      <stop offset="100%" stop-color="#1681c9" />
    </linearGradient>
    <mask id="swum-cog-mask" maskUnits="userSpaceOnUse">
      <rect width="320" height="320" fill="black" />
      <circle cx="160" cy="160" r="100" fill="white" />
      <rect x="235" y="135" width="50" height="50" fill="white" />
      <rect x="235" y="135" width="50" height="50" fill="white" transform="rotate(45 160 160)" />
      <rect x="235" y="135" width="50" height="50" fill="white" transform="rotate(90 160 160)" />
      <rect x="235" y="135" width="50" height="50" fill="white" transform="rotate(135 160 160)" />
      <rect x="235" y="135" width="50" height="50" fill="white" transform="rotate(180 160 160)" />
      <rect x="235" y="135" width="50" height="50" fill="white" transform="rotate(225 160 160)" />
      <rect x="235" y="135" width="50" height="50" fill="white" transform="rotate(270 160 160)" />
      <rect x="235" y="135" width="50" height="50" fill="white" transform="rotate(315 160 160)" />
      <circle cx="160" cy="160" r="40" fill="black" />
    </mask>
  </defs>
  <!-- circular cog body -->
  <rect width="320" height="320" fill="url(#swum-cog-gradient)" mask="url(#swum-cog-mask)" />
  <!-- update curve arrow -->
  <marker id="swum-update-arrow" markerWidth="13" markerHeight="13" refX="1.5" refY="3" orient="auto-start-reverse">
    <polygon points="0.5,1 3,3 0.5,5" fill="url(#swum-arrow-gradient)" />
  </marker>
  <!-- bottom update arrow -->
  <g fill="none" stroke="url(#swum-arrow-gradient)" stroke-width="10">
    <path d="M 90,160 A 70,70 0,0,0 209.49747468,209.49747468" marker-start="url(#swum-update-arrow)" />
    <path d="M 110.50252532,110.50252532 A 70,70 0,0,1 230,160" marker-end="url(#swum-update-arrow)" />
  </g>
</svg>
